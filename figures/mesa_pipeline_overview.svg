   </g>
   <g id="text_3">
    <text style="font-size: 10.5px; font-family: 'DejaVu Sans'; text-anchor: start; fill: #5e6b7a" x="74.997" y="42.565719" transform="rotate(-0 74.997 42.565719)">Each modality is processed independently, then combined by stacked learning.</text>
   </g>
   <g id="text_4">
    <text style="font-size: 11px; font-family: 'DejaVu Sans'; fill: #1d2433" transform="translate(68.908344 99.295138)">Modality 1</text>
    <text style="font-size: 11px; font-family: 'DejaVu Sans'; fill: #1d2433" transform="translate(49.640297 111.445567)">sample × feature</text>
   </g>
   <g id="text_5">
    <text style="font-size: 11px; font-family: 'DejaVu Sans'; fill: #1d2433" transform="translate(68.908344 162.718498)">Modality 2</text>
    <text style="font-size: 11px; font-family: 'DejaVu Sans'; fill: #1d2433" transform="translate(49.640297 174.868927)">sample × feature</text>
   </g>
   <g id="text_6">
    <text style="font-size: 11px; font-family: 'DejaVu Sans'; fill: #1d2433" transform="translate(68.922094 226.141858)">Modality n</text>
    <text style="font-size: 11px; font-family: 'DejaVu Sans'; fill: #1d2433" transform="translate(49.640297 238.292287)">sample × feature</text>
   </g>
   <g id="text_7">
    <text style="font-size: 11px; font-family: 'DejaVu Sans'; fill: #1d2433" transform="translate(203.540734 138.727096)">Per-modality preprocessing</text>
    <text style="font-size: 11px; font-family: 'DejaVu Sans'; fill: #1d2433" transform="translate(278.388 150.877524)"/>
    <text style="font-size: 11px; font-family: 'DejaVu Sans'; fill: #1d2433" transform="translate(182.840969 163.027952)">• missing-value filter + imputation</text>
    <text style="font-size: 11px; font-family: 'DejaVu Sans'; fill: #1d2433" transform="translate(235.175187 175.178381)">• variance filter</text>
    <text style="font-size: 11px; font-family: 'DejaVu Sans'; fill: #1d2433" transform="translate(221.854875 187.328809)">• univariate selector</text>
   </g>
   <g id="text_8">
    <text style="font-size: 11px; font-family: 'DejaVu Sans'; fill: #1d2433" transform="translate(389.888172 144.80231)">Optional redundancy pruning</text>
    <text style="font-size: 11px; font-family: 'DejaVu Sans'; fill: #1d2433" transform="translate(470.4795 156.952738)"/>
    <text style="font-size: 11px; font-family: 'DejaVu Sans'; fill: #1d2433" transform="translate(403.382938 169.103167)">keep one representative</text>
    <text style="font-size: 11px; font-family: 'DejaVu Sans'; fill: #1d2433" transform="translate(415.246609 181.253595)">per correlated block</text>
   </g>
   <g id="text_9">
